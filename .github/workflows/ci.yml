name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      # The interop test self-skips here because mcp-server/node_modules
      # is absent; that is expected. The interop job covers it.
      - name: Run CLI tests
        run: python -m unittest discover -s tests -v

  node:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 24]
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Audit dependencies
        run: npm audit --audit-level=moderate
      - name: Run MCP server tests
        run: npm test

  parity:
    name: Dual-runtime parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      - name: Install MCP server dependencies
        run: npm ci
        working-directory: mcp-server
      - name: Run CLI and MCP interop tests
        run: python -m unittest tests.test_interop -v
      - name: Check shared parity manifests
        run: |
          node scripts/check_surface_manifest.mjs
          node scripts/check_classification_rules_manifest.mjs

  hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
      - name: Generated files are in sync
        run: |
          python scripts/build_variants.py
          git diff --exit-code CLAUDE.md AGENTS.md .cursorrules
          node scripts/build_registry_docs.mjs
          git diff --exit-code docs/adapter-candidates.md
          node scripts/check_surface_manifest.mjs
          node scripts/check_classification_rules_manifest.mjs
      - name: Installer smoke
        run: |
          mkdir -p "$RUNNER_TEMP/mythify-project"
          XDG_DATA_HOME="$RUNNER_TEMP/mythify-data" scripts/install_user.sh \
            --prefix "$RUNNER_TEMP/mythify-install" \
            --project "$RUNNER_TEMP/mythify-project"
          ! find mcp-server -maxdepth 1 -name 'mythify-mcp-*.tgz' | grep -q .
          (cd "$RUNNER_TEMP/mythify-project" && "$RUNNER_TEMP/mythify-install/bin/mythify" status)
          test -x "$RUNNER_TEMP/mythify-install/bin/mythify-mcp"
          VERSION="$(node -p "require('./mcp-server/package.json').version")"
          MCP_DIR="$RUNNER_TEMP/mythify-data/mythify/$VERSION/mcp-server"
          cd "$MCP_DIR"
          node --input-type=module <<'NODE'
          import assert from "node:assert/strict";
          import fs from "node:fs";
          import os from "node:os";
          import path from "node:path";
          import { Client } from "@modelcontextprotocol/sdk/client/index.js";
          import { StdioClientTransport } from "@modelcontextprotocol/sdk/client/stdio.js";

          const stateDir = fs.mkdtempSync(path.join(os.tmpdir(), "mythify-ci-install-"));
          const transport = new StdioClientTransport({
            command: process.env.RUNNER_TEMP + "/mythify-install/bin/mythify-mcp",
            env: { ...process.env, MYTHIFY_DIR: stateDir },
          });
          const client = new Client({ name: "mythify-ci-install", version: "1.0.0" });
          await client.connect(transport);
          try {
            const listed = await client.listTools();
            const manifest = JSON.parse(fs.readFileSync("protocol/surface-manifest.json", "utf8"));
            assert.equal(listed.tools.length, manifest.surfaces.mcp.total_tools);
          } finally {
            await client.close();
          }
          NODE
      - name: ASCII rules
        run: |
          python - <<'PY'
          import subprocess
          import sys

          SKIP = {"docs/research-report.md"}

          def is_banned(codepoint):
              if codepoint in (0x2013, 0x2014, 0xFE0F):
                  return True
              if 0x1F000 <= codepoint <= 0x1FAFF:
                  return True
              if 0x2600 <= codepoint <= 0x27BF:
                  return True
              if 0x2B00 <= codepoint <= 0x2BFF:
                  return True
              return False

          listing = subprocess.run(
              ["git", "ls-files"],
              capture_output=True,
              text=True,
              check=True,
          )
          problems = []
          for path in listing.stdout.splitlines():
              if path in SKIP:
                  continue
              try:
                  with open(path, encoding="utf-8") as handle:
                      lines = handle.readlines()
              except (OSError, UnicodeDecodeError):
                  continue
              for lineno, line in enumerate(lines, start=1):
                  for char in line:
                      codepoint = ord(char)
                      if is_banned(codepoint):
                          problems.append(
                              "{0}:{1}: U+{2:04X}".format(path, lineno, codepoint)
                          )
          if problems:
              print("Banned characters found (dashes or emoji):")
              for problem in problems:
                  print(problem)
              sys.exit(1)
          print("ASCII rules check passed.")
          PY
